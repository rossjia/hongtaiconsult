dibility: guideline-backed vs. industry-promoted?",hintCn:"举例：权威指南推荐 vs 企业商业推广？"},{id:"inn_evidence",name:"B. Innovation Evidence-Base",nameCn:"B. 创新的证据基础",description:"The innovation has robust evidence supporting its effectiveness.",descriptionCn:"支持创新有效性的证据的质量和力度。需识别临床数据中的痛点，如缺乏特定亚群数据（亚裔、老年患者等）。",hint:"Evidence strength: sufficient data for target patient populations?",hintCn:"举例：是否有足够数据支撑目标患者群体？"},{id:"inn_advantage",name:"C. Innovation Relative Advantage",nameCn:"C. 创新的相对优势",description:"The innovation is better than other available innovations or current practice.",descriptionCn:"与替代方案相比，实施该创新的感知优势。不仅是疗效，还包括安全性、便利性、科室周转效率等。注意：这是感知优势，而非客观优势。",hint:"Perceived advantage: efficacy/safety/convenience vs. SOC",hintCn:"举例：疗效/安全性/便利性/科室效率 vs 标准治疗"},{id:"inn_adaptability",name:"D. Innovation Adaptability",nameCn:"D. 创新的可适应性",description:"The innovation can be modified, tailored, or refined to fit local context or needs.",descriptionCn:"创新在多大程度上可修改以适应当地需求。需区分核心要素（不可变，如剂量）与适应性边缘（可变，如给药时间、日间化疗流程配合等）。",hint:"Core vs. peripheral: can it adapt to local workflows?",hintCn:"举例：核心要素(剂量)不可变，边缘(给药时间)可调整"},{id:"inn_trialability",name:"E. Innovation Trialability",nameCn:"E. 创新的可试用性",description:"The innovation can be tested or piloted on a small scale and undone.",descriptionCn:"在全面实施前，能否小规模测试创新的能力。如推动试点项目或早期体验计划，先在特定病区或特定患者中试用评估后再推广。",hint:"Can pilot in specific ward/patients before scaling?",hintCn:"举例：先在特定病区/患者试点，评估后再推广"},{id:"inn_complexity",name:"F. Innovation Complexity",nameCn:"F. 创新的复杂性",description:"The innovation is complicated, which may be reflected by its scope and/or the nature and number of connections and steps.",descriptionCn:"实施创新的感知难度（步骤数量、所需技能）。如CAR-T等复杂疗法需识别操作瓶颈（解冻、回输、不良反应监测、REMS流程等）。",hint:"Perceived difficulty: steps, skills, operational bottlenecks",hintCn:"举例：CAR-T解冻/回输/不良反应监测/REMS流程"},{id:"inn_design",name:"G. Innovation Design",nameCn:"G. 创新设计",description:"The innovation is well designed and packaged, including how it is assembled, bundled, and presented.",descriptionCn:"创新的包装、呈现和组装质量。包括药物包装、给药装置、患者教育材料的易用性，以及配套支持方案的完整度。",hint:"Packaging, device usability & patient education materials",hintCn:"举例：预充式注射器操作反馈/说明书易读性"},{id:"inn_cost",name:"H. Innovation Cost",nameCn:"H. 创新成本",description:"The innovation purchase and operating costs are affordable.",descriptionCn:"实施创新的相关成本，包括购买和操作成本。需超越药物本身价格，关注实施成本（如额外护理时间、设备折旧、人力运营成本等）。",hint:"Total cost: drug price + implementation costs (staffing/equipment)",hintCn:"举例：药费 + 额外护理时间/设备折旧/人力运营成本"}]},{id:"outer_setting",name:"Outer Setting",nameCn:"外部环境",icon:"🌐",color:"#a78bfa",constructs:[{id:"out_critical",name:"A. Critical Incidents",nameCn:"A. 关键事件",description:"Large-scale and/or unanticipated events disrupt implementation and/or delivery of the innovation.",descriptionCn:"大规模、突发性破坏或改变实施环境的事件。如COVID-19大流行影响新药准入、供应链稳定性及临床诊疗路径等。",hint:"Critical events impacting drug access, supply chain & care pathways",hintCn:"举例：疫情后药事委员会流程变化/供应链中断"},{id:"out_attitudes",name:"B. Local Attitudes",nameCn:"B. 地方态度",description:"Sociocultural values and beliefs encourage the Outer Setting to support implementation.",descriptionCn:"社区层面的社会文化价值观和信仰。如特定文化背景下对疾病的病耻感影响就医，或患者群体对基因检测等新技术的文化/心理顾虑。",hint:"Sociocultural values: stigma, acceptance of new technologies",hintCn:"举例：患者对基因检测的文化顾虑/疾病病耻感"},{id:"out_conditions",name:"C. Local Conditions",nameCn:"C. 地方条件",description:"Economic, environmental, political, and/or technological conditions enable support for implementation.",descriptionCn:"能够支持实施的经济、环境、政治条件。关注城乡医疗资源差异，基层医院可能缺乏必要检测设备，本地医保结余情况影响高值药品处方倾向。",hint:"Urban-rural gap, diagnostic equipment, insurance budget impact",hintCn:"举例：基层缺乏检测设备/医保结余影响处方倾向"},{id:"out_partnerships",name:"D. Partnerships & Connections",nameCn:"D. 伙伴关系与联系",description:"The Inner Setting is networked with external entities, including referral networks, academic affiliations, and professional organizations.",descriptionCn:"内部环境与外部实体的连接程度，包括转诊网络、学术联盟、专业组织。如医联体建设、分级诊疗、双向转诊机制是否畅通。",hint:"Medical consortium, referral networks & academic connections",hintCn:"举例：医联体双向转诊机制/分级诊疗网络"},{id:"out_policies",name:"E. Policies & Laws",nameCn:"E. 政策与法律",description:"Legislation, regulations, professional guidelines, or accreditation standards support implementation.",descriptionCn:"法律法规、专业指南、认证标准对实施的支持程度。如国家医保目录（NRDL）、带量采购（VBP）、临床路径管理、卫健委诊疗规范等。",hint:"NRDL, VBP, clinical pathways & regulatory guidelines",hintCn:"举例：NRDL纳入/带量采购/卫健委诊疗规范指导"},{id:"out_financing",name:"F. Financing",nameCn:"F. 融资",description:"Funding from external entities (e.g., grants, reimbursement) is available to implement the innovation.",descriptionCn:"来自外部实体的资金支持。关注DRG/DIP付费改革对创新药使用的限制，以及惠民保特药报销、商业保险、患者援助项目等多元支付渠道。",hint:"DRG/DIP constraints, supplemental insurance & patient assistance",hintCn:"举例：DRG控费与创新药使用平衡/惠民保特药报销"},{id:"out_pressure",name:"G. External Pressure",nameCn:"G. 外部压力",description:"External pressures drive implementation, including: (1) Societal Pressure — mass media, advocacy groups, social movements; (2) Market Pressure — competing with/imitating peer entities; (3) Performance-Measurement Pressure — quality metrics, benchmarking, service goals.",descriptionCn:"外部压力驱动实施，包括：(1) 社会压力——患者组织呼吁、媒体宣传；(2) 市场压力——竞争医院率先开展新疗法、区域卓越示范中心；(3) 绩效测量压力——DRG/DIP控费考核、政府质量指标",hint:"Patient advocacy / peer competition / DRG performance metrics",hintCn:"举例：患者组织呼吁/竞争医院率先开展/DRG考核"}]},{id:"inner_setting",name:"Inner Setting",nameCn:"内部环境",icon:"🏥",color:"#34d399",constructs:[{id:"ins_structure",name:"A. Structural Characteristics",nameCn:"A. 结构特征",description:"Infrastructure components support functional performance, including: (1) Physical Infrastructure — layout, space, tangible features; (2) IT Infrastructure — telecom, electronic documentation, data systems; (3) Work Infrastructure — task organization, staffing levels.",descriptionCn:"支持内部环境功能运作的基础组件，包括：(1) 物质基础——冷链物流能力、输液椅数量、空间布局；(2) 信息技术基础——EMR系统兼容性、自动筛查功能；(3) 工作基础——人员配置、任务责任分配",hint:"E.g., cold chain, EMR compatibility, infusion chairs, staffing",hintCn:"举例：冷链物流/EMR兼容性/输液椅数量/人员配置"},{id:"ins_relational",name:"B. Relational Connections",nameCn:"B. 关系连接",description:"High quality formal and informal relationships, networks, and teams within and across Inner Setting boundaries.",descriptionCn:"组织内和跨组织的高质量正式和非正式协作、网络和团队。如MDT多学科诊疗团队的协作质量，病理科与肿瘤内科在生物标志物检测报告解读上的沟通。",hint:"E.g., MDT collaboration, pathology-oncology communication",hintCn:"举例：MDT协作质量/病理与肿瘤科沟通顺畅度"},{id:"ins_communications",name:"C. Communications",nameCn:"C. 沟通",description:"High quality formal and informal information sharing practices within and across Inner Setting boundaries.",descriptionCn:"组织内和跨组织的高质量正式和非正式信息共享。如科室晨会、病例讨论会作为信息传播渠道，新指南更新如何传达给年轻医生。",hint:"E.g., morning rounds, case discussions, guideline dissemination",hintCn:"举例：科室晨会/病例讨论会/指南更新传达渠道"},{id:"ins_culture_eq",name:"D1. Culture: Equality-Centered",nameCn:"D1. 文化：以平等为中心",description:"Shared values, beliefs, and norms about the inherent equal worth and value of all human beings.",descriptionCn:"组织中关于所有人固有平等价值的共同价值观、信仰和规范。",hint:"E.g., equitable access to innovation for all patient groups",hintCn:"举例：所有患者群体平等获得创新治疗的机会"},{id:"ins_culture_pt",name:"D2. Culture: Recipient(Patient)-Centered",nameCn:"D2. 文化：以患者为中心",description:"Shared values, beliefs, and norms around caring, supporting, and addressing the needs and welfare of recipients (patients).",descriptionCn:"组织中关于关怀、支持和满足患者需求与福祉的共同价值观、信仰和规范。",hint:"E.g., patient-first philosophy, shared decision-making",hintCn:"举例：患者至上理念/共同决策/患者满意度优先"},{id:"ins_culture_staff",name:"D3. Culture: Deliverer(Staff)-Centered",nameCn:"D3. 文化：以医护为中心",description:"Shared values, beliefs, and norms around caring, supporting, and addressing the needs and welfare of deliverers (clinical staff).",descriptionCn:"组织中关于关怀、支持和满足医护人员需求与福祉的共同价值观、信仰和规范。",hint:"E.g., staff well-being support, manageable workload, burnout prevention",hintCn:"举例：医护减负支持/合理工作量/职业倦怠预防"},{id:"ins_culture_learn",name:"D4. Culture: Learning-Centered",nameCn:"D4. 文化：以学习为中心",description:"Shared values, beliefs, and norms around psychological safety, continual improvement, and using data to inform practice.",descriptionCn:"组织中关于心理安全、持续改进和数据驱动实践的共同价值观、信仰和规范。",hint:"E.g., openness to clinical research, new technologies, data-driven improvement",hintCn:"举例：鼓励临床研究/接纳新技术/数据驱动持续改进"},{id:"ins_tension",name:"E. Tension for Change",nameCn:"E. 变革张力",description:"The current situation is intolerable and needs to change.",descriptionCn:"当前状况不可容忍，需要改变（未满足的临床需求）",hint:"Unmet clinical need urgency",hintCn:"举例：现有治疗方案疗效不佳/患者预后差"},{id:"ins_compatibility",name:"F. Compatibility",nameCn:"F. 兼容性",description:"The innovation fits with workflows, systems, and processes.",descriptionCn:"创新方案与现有工作流程、系统和流程的契合度",hint:"Fits existing clinical workflow?",hintCn:"举例：新疗法能否融入现有日间化疗/住院流程？"},{id:"ins_priority",name:"G. Relative Priority",nameCn:"G. 相对优先级",description:"Implementing the innovation is important compared to other initiatives.",descriptionCn:"相比其他项目，实施该创新方案的重要性排序",hint:"Priority vs. other dept initiatives",hintCn:"举例：相比其他科室在推项目的优先排序"},{id:"ins_incentives",name:"H. Incentive Systems",nameCn:"H. 激励系统",description:"Tangible and/or intangible incentives and rewards support implementation.",descriptionCn:"支持创新实施和推动的有形或无形激励/奖励或抑制/惩罚。如医院绩效考核（KPI）与合理用药指标，循证医学实践的奖励机制。",hint:"E.g., KPI rewards for EBM practice, rational drug use metrics",hintCn:"举例：绩效KPI中循证实践奖励/合理用药考核指标"},{id:"ins_mission",name:"I. Mission Alignment",nameCn:"I. 使命对齐",description:"Implementing the innovation is in line with the overarching commitment, purpose, or goals.",descriptionCn:"实施创新方案是否符合组织的总体承诺、宗旨或目标",hint:"Aligns with hospital strategic goals?",hintCn:"举例：是否契合医院学科建设/重点专科战略？"},{id:"ins_resources_fund",name:"J1. Available Resources: Funding",nameCn:"J1. 可用资源：资金",description:"Funding is available to implement and deliver the innovation, e.g., departmental budget, special project funding.",descriptionCn:"实施创新方案的资金是否可用，如科室预算、专项经费、新技术启动资金等。",hint:"E.g., departmental budget, special project funding",hintCn:"举例：科室预算/专项经费/新技术启动资金"},{id:"ins_resources_space",name:"J2. Available Resources: Space",nameCn:"J2. 可用资源：空间",description:"Physical space is available to implement and deliver the innovation, e.g., treatment rooms, isolation wards, bed turnover.",descriptionCn:"实施创新方案的物理空间是否可用，如治疗室、隔离病房、床位周转率等。",hint:"E.g., treatment rooms, isolation wards, bed turnover rate",hintCn:"举例：治疗室/隔离病房/床位周转率"},{id:"ins_resources_equip",name:"J3. Available Resources: Materials & Equipment",nameCn:"J3. 可用资源：材料与设备",description:"Supplies, materials and equipment are available to implement and deliver the innovation, including staffing levels.",descriptionCn:"实施创新方案所需的材料、设备和人力是否可用，如单采机、监测设备、护士配比、患者教育时间等。",hint:"E.g., apheresis machines, monitoring devices, nursing staffing ratio",hintCn:"举例：单采机/监测设备/护理人手/患者教育时间"},{id:"ins_knowledge",name:"K. Access to Knowledge & Information",nameCn:"K. 获取知识与信息",description:"Guidance and/or training is accessible to implement and deliver the innovation.",descriptionCn:"可获得实施和推动创新的指导或培训。如MSL提供的文献服务、医学教育平台、数字化学术平台查阅药物相互作用信息等。",hint:"E.g., MSL literature service, digital platforms, drug info access",hintCn:"举例：MSL文献服务/数字化学术平台/药物信息查阅"}]},{id:"individuals",name:"Individuals",nameCn:"个人领域",icon:"👩‍⚕️",color:"#f472b6",constructs:[{id:"_header_roles",name:"── Roles Subdomain ──",nameCn:"── 角色子域 ──",description:"Identify the roles applicable to the project. Not all roles need to be rated — only those relevant to your implementation context.",descriptionCn:"识别与项目相关的角色。并非所有角色都需要评分——仅评估与您的实施情境相关的角色。",hint:"",hintCn:""},{id:"ind_high_leaders",name:"A. High-level Leaders",nameCn:"A. 高层领导",description:"Individuals with a high level of authority, including key decision-makers, executive leaders, or directors.",descriptionCn:"具有高级权限的个人（关键决策者、院长、医务处主任等）对实施的支持程度。",hint:"E.g., hospital director, medical affairs head",hintCn:"举例：院长/医务处主任对新疗法的支持态度"},{id:"ind_mid_leaders",name:"B. Mid-level Leaders",nameCn:"B. 中层领导",description:"Individuals with a moderate level of authority, supervised by high-level leaders and who supervise others.",descriptionCn:"具有中级权限的个人（科主任、护士长等）对实施的推动作用。",hint:"E.g., department head, head nurse",hintCn:"举例：科主任/护士长的推动力度"},{id:"ind_opinion_leaders",name:"C. Opinion Leaders",nameCn:"C. 意见领袖",description:"Individuals with informal influence on the attitudes and behaviors of others.",descriptionCn:"对他人态度和行为具有非正式影响力的个人（院内KOL）。",hint:"E.g., influential clinician peers, internal KOLs",hintCn:"举例：院内有影响力的临床专家/KOL"},{id:"ind_facilitators",name:"D. Implementation Facilitators",nameCn:"D. 实施促进者",description:"Individuals with subject matter expertise who assist, coach, or support implementation.",descriptionCn:"具有专业知识、协助和支持实施的个人（MSL、临床药师、厂家技术支持）。",hint:"E.g., MSL, clinical pharmacist, vendor technical support",hintCn:"举例：MSL/临床药师/厂家技术支持的可及性"},{id:"ind_impl_leads",name:"E. Implementation Leads",nameCn:"E. 实施负责人",description:"Individuals who lead efforts to implement the innovation.",descriptionCn:"领导创新方案实施工作的个人（项目负责人、首席研究者）的领导力与投入度。",hint:"E.g., project lead, principal investigator",hintCn:"举例：项目负责人/PI的领导力与投入度"},{id:"ind_team_members",name:"F. Implementation Team Members",nameCn:"F. 实施团队成员",description:"Individuals who collaborate with and support the Implementation Leads, ideally including Innovation Deliverers and Recipients.",descriptionCn:"与实施负责人协作的团队成员（含交付者和接收者代表）的参与度与协作质量。",hint:"E.g., cross-functional team engagement & collaboration quality",hintCn:"举例：跨职能团队的参与度与协作质量"},{id:"ind_other_support",name:"G. Other Implementation Support",nameCn:"G. 其他实施支持",description:"Individuals who support the Implementation Leads and/or Team Members to implement the innovation.",descriptionCn:"支持实施的其他个人（行政、后勤、药房等）的配合程度。",hint:"E.g., admin, logistics, pharmacy coordination",hintCn:"举例：行政/后勤/药房的配合程度"},{id:"ind_deliverers",name:"H. Innovation Deliverers",nameCn:"H. 创新交付者",description:"Individuals who are directly or indirectly delivering the innovation.",descriptionCn:"直接或间接交付创新方案的个人（处方医生、护理团队）的意愿与准备度。",hint:"E.g., prescribing physicians, nursing team readiness",hintCn:"举例：处方医生/护理团队的意愿与准备度"},{id:"ind_recipients",name:"I. Innovation Recipients",nameCn:"I. 创新接收者",description:"Individuals who are directly or indirectly receiving the innovation.",descriptionCn:"直接或间接接受创新方案的个人（患者及家属）的接受度与参与意愿。",hint:"E.g., patient & family acceptance and willingness",hintCn:"举例：患者及家属的接受度与参与意愿"},{id:"_header_chars",name:"── Characteristics Subdomain (COM-B) ──",nameCn:"── 特征子域（基于COM-B模型）──",description:"Assess the characteristics of key individuals using the COM-B framework. Evaluate across the most critical roles identified above.",descriptionCn:"基于COM-B模型评估关键个色的特征。针对上方识别的最关键角色进行综合评估。",hint:"",hintCn:""},{id:"ind_need",name:"A. Need",nameCn:"A. 需求",description:"The individual(s) has deficits related to survival, well-being, or personal fulfillment, which will be addressed by implementation and/or delivery of the innovation.",descriptionCn:"关键角色在生存、健康或个人成就方面的缺口，可通过创新方案解决（如未满足的临床需求驱动力）。",hint:"E.g., unmet clinical needs driving adoption motivation",hintCn:"举例：未满足的临床需求对采纳的驱动力"},{id:"ind_capability",name:"B. Capability",nameCn:"B. 能力",description:"The individual(s) has interpersonal competence, knowledge, and skills to fulfill their role.",descriptionCn:"关键角色是否具备履行角色所需的人际能力、知识和技能（如CAR-T管理经验、CRS处理能力）。",hint:"E.g., CAR-T management experience, CRS handling skills",hintCn:"举例：CAR-T管理经验/CRS处理能力/新技术学习能力"},{id:"ind_opportunity",name:"C. Opportunity",nameCn:"C. 机会",description:"The individual(s) has availability, scope, and power to fulfill their role.",descriptionCn:"关键角色是否有时间、范围和权力来履行角色（如临床工作量是否允许投入新项目）。",hint:"E.g., clinical workload allows time for new initiatives",hintCn:"举例：临床工作量是否允许投入/权限范围/决策空间"},{id:"ind_motivation",name:"D. Motivation",nameCn:"D. 动机",description:"The individual(s) is committed to fulfilling their role.",descriptionCn:"关键角色对履行角色的承诺与投入程度（含内在动机如学术兴趣，外在动机如绩效激励）。",hint:"E.g., academic interest, performance incentives, career goals",hintCn:"举例：学术兴趣/绩效激励/职业发展目标"}]},{id:"process",name:"Implementation Process",nameCn:"实施过程",icon:"⚙️",color:"#fb923c",constructs:[{id:"pro_teaming",name:"A. Teaming",nameCn:"A. 团队协作",description:"Join together, intentionally coordinating and collaborating on interdependent tasks, to implement the innovation.",descriptionCn:"为实施创新在相互依赖的任务上有意协调和协作。如MSL协助牵头组建MDT核心专家组或新药规范化管理小组。",hint:"E.g., form core implementation team with physician/nurse/pharmacist",hintCn:"举例：组建含主治医/专科护士/临床药师的实施先锋小组"},{id:"pro_assessing_needs",name:"B. Assessing Needs",nameCn:"B. 需求评估",description:"Collect information about priorities, preferences, and needs, including: (1) Innovation Deliverers — clinician training needs, workflow preferences; (2) Innovation Recipients — patient priorities, preferences, and needs.",descriptionCn:"收集推动者与接受者的优先级、偏好和需求信息。如上市前KDD调研、患者旅程分析，识别医护最迫切的资源需求和患者最担心的问题。",hint:"E.g., staff training needs vs. patient home AE management concerns",hintCn:"举例：医护需要操作带教还是排班优化？患者最担心居家不良反应管理？"},{id:"pro_assessing_context",name:"C. Assessing Context",nameCn:"C. 评估背景",description:"Collect information to identify and appraise barriers and facilitators to implementation.",descriptionCn:"收集信息以识别和评估实施的障碍与促进因素。如运用CFIR框架进行态势分析，MSL在CRM系统中填写的Insights本质就是持续的环境评估。",hint:"E.g., CFIR-based hospital access & prescribing barrier assessment",hintCn:"举例：运用CFIR对目标医院进行准入与处方障碍体检"},{id:"pro_planning",name:"D. Planning",nameCn:"D. 规划",description:"Identify roles and responsibilities, outline specific steps and milestones, and define goals and measures for success.",descriptionCn:"确定角色和职责，概述具体步骤和里程碑，预先确定实施成功的目标和措施。如撰写整合证据计划（IEP）与战术执行日历。",hint:"E.g., Q1 hospital access, Q2 regional training, Q3 RWE enrollment",hintCn:"举例：Q1核心医院准入/Q2区域培训/Q3启动RWE队列登记"},{id:"pro_tailoring",name:"E. Tailoring Strategies",nameCn:"E. 量身定制策略",description:"Choose and operationalize implementation strategies to address barriers, leverage facilitators, and fit context.",descriptionCn:"选择并调整实施策略以解决障碍、利用促进因素并适应环境。如CFIR-ERIC策略匹配与敏捷调整——发现障碍是流程复杂而非认知不足时，从学术会议转向驻场指导。",hint:"E.g., shift from conferences to on-site clinical specialist coaching",hintCn:"举例：障碍是流程复杂→从学术会议转向临床专员驻场指导"},{id:"pro_engaging",name:"F. Engaging",nameCn:"F. 参与动员",description:"Attract and encourage participation in implementation, including: (1) Innovation Deliverers — physician & nurse engagement; (2) Innovation Recipients — patient enrollment & engagement.",descriptionCn:"吸引和鼓励人员参与实施或创新。包括：(1) 动员推动者——邀请KOL作为国家级倡导者(Champion)分享成功经验；(2) 动员接受者——与患者协会合作开展疾病认知倡导活动。",hint:"E.g., recruit KOL Champions; partner with patient associations",hintCn:"举例：邀请KOL做Champion分享经验/联合患者协会提高就诊率"},{id:"pro_doing",name:"G. Doing",nameCn:"G. 执行",description:"Implement in small steps, tests, or cycles of change to trial and cumulatively optimize delivery.",descriptionCn:"在小步骤、测试或变更周期中实施，以试验和累积优化。如区域试点与卓越中心（COE）建设，采用PDSA循环，先在头部三甲跑通路径后再复制推广。",hint:"E.g., pilot in 3 top hospitals → validate pathways → scale out",hintCn:"举例：先选3家头部三甲试点→跑通路径→复制到广阔市场"},{id:"pro_reflecting",name:"H. Reflecting & Evaluating",nameCn:"H. 反思与评估",description:"Collect and discuss quantitative and qualitative information about success, including: (1) Implementation — process fidelity, adoption metrics; (2) Innovation — clinical outcomes, safety data (efficacy/AE).",descriptionCn:"收集和讨论关于实施或创新的定量和定性信息。如组织区域专家顾问会，拿出真实世界处方数据和用药脱落率，反思实施环节问题。",hint:"E.g., advisory board reviews RWE data to identify enrollment bottlenecks",hintCn:"举例：顾问会反思RWE数据——入组放缓的环节瓶颈在哪？"},{id:"pro_adapting",name:"I. Adapting",nameCn:"I. 适应调整",description:"Modify the innovation and/or the Inner Setting for optimal fit and integration into work processes.",descriptionCn:"修改创新或内部环境，以便实施策略能更好地整合到工作流程中。如根据真实世界反馈进行临床路径本土化微调，或推出补充指南提高基层可及性。",hint:"E.g., develop room-temp storage guideline to improve rural access",hintCn:"举例：因基层无冷链→推出常温短期保存补充指南提高可及性"}]}],Lz=[{id:"eric_1",name:"Conduct Educational Meetings",nameCn:"开展教育会议",description:"Hold meetings targeted toward different stakeholder groups to teach them about the innovation",descriptionCn:"针对不同利益相关者群体举办会议，介绍创新方案的临床证据与使用方法",targetBarriers:["ind_capability","ins_knowledge","inn_evidence","ind_need"]},{id:"eric_2",name:"Develop Educational Materials",nameCn:"开发教育材料",description:"Create and distribute guideline summaries, clinical data packages, and training materials",descriptionCn:"创建并分发指南摘要、临床数据包和培训材料",targetBarriers:["ind_capability","ins_knowledge","inn_evidence"]},{id:"eric_3",name:"Identify & Prepare Champions",nameCn:"识别并培养推动者",description:"Identify and prepare individuals who will promote the innovation internally",descriptionCn:"识别并培养将在内部推广创新方案的关键人物",targetBarriers:["ind_high_leaders","ind_mid_leaders","ind_opinion_leaders","ind_motivation"]},{id:"eric_4",name:"Facilitate Relay to External Resources",nameCn:"促进外部资源对接",description:"Connect stakeholders with external experts, KOL networks, and peer institutions",descriptionCn:"将利益相关者与外部专家、KOL 网络及同行机构对接",targetBarriers:["out_partnerships","ind_opinion_leaders","out_pressure"]},{id:"eric_5",name:"Access New Funding",nameCn:"获取新资金来源",description:"Identify and secure new funding sources including commercial insurance and patient assistance",descriptionCn:"识别并获取新的资金来源，包括商保、惠民保及患者援助项目",targetBarriers:["out_financing","ins_resources_fund","ins_resources_space","ins_resources_equip","inn_cost","out_conditions"]},{id:"eric_6",name:"Develop Formal Implementation Blueprint",nameCn:"制定正式实施蓝图",description:"Create a detailed plan for implementation including timelines, milestones, and responsibilities",descriptionCn:"制定包含时间线、里程碑和责任分工的详细实施计划",targetBarriers:["pro_planning","pro_doing","inn_complexity","pro_tailoring"]},{id:"eric_7",name:"Build Multidisciplinary Team",nameCn:"组建多学科团队",description:"Assemble a multidisciplinary team to oversee and support implementation",descriptionCn:"组建 MDT 团队监督和支持实施过程",targetBarriers:["ins_relational","pro_teaming","ins_structure","ins_communications"]},{id:"eric_8",name:"Conduct Local Consensus Discussions",nameCn:"开展本地共识讨论",description:"Facilitate local discussions to build consensus on implementation approach",descriptionCn:"促进本地讨论，就实施方法达成共识",targetBarriers:["ins_culture_eq","ins_culture_pt","ins_culture_staff","ins_culture_learn","ins_tension","ins_compatibility","out_attitudes"]},{id:"eric_9",name:"Provide Clinical Supervision & Coaching",nameCn:"提供临床督导与辅导",description:"Offer ongoing clinical supervision and coaching during implementation",descriptionCn:"在实施过程中提供持续的临床督导与辅导",targetBarriers:["ind_capability","pro_doing","inn_complexity","pro_adapting","ind_facilitators"]},{id:"eric_10",name:"Audit & Provide Feedback",nameCn:"审计并提供反馈",description:"Collect and summarize clinical performance data and provide feedback to stakeholders",descriptionCn:"收集并汇总临床绩效数据，向利益相关者提供反馈",targetBarriers:["pro_reflecting","pro_adapting","ind_motivation","out_pressure"]},{id:"eric_11",name:"Tailor Strategies to Overcome Barriers",nameCn:"定制策略以克服障碍",description:"Customize implementation strategies based on identified barriers",descriptionCn:"根据识别出的障碍定制实施策略",targetBarriers:["inn_adaptability","inn_complexity","out_conditions","pro_tailoring","pro_assessing_context"]},{id:"eric_12",name:"Promote Adaptability",nameCn:"促进方案适应性",description:"Identify the ways the innovation can be tailored to meet local needs",descriptionCn:"识别创新方案可根据本地需求进行调整的方式",targetBarriers:["inn_adaptability","inn_design","inn_trialability"]},{id:"eric_13",name:"Involve Patients & Families",nameCn:"纳入患者与家属",description:"Engage patients and families in the implementation process",descriptionCn:"让患者和家属参与实施过程，提升依从性和满意度",targetBarriers:["ind_recipients","pro_engaging","ind_need","pro_assessing_needs"]},{id:"eric_14",name:"Obtain Formal Commitments",nameCn:"获取正式承诺",description:"Obtain formal written commitments from key stakeholders and leadership",descriptionCn:"从关键利益相关者和领导层获取正式书面承诺",targetBarriers:["ind_high_leaders","ins_mission","pro_planning","ins_priority"]},{id:"eric_15",name:"Develop Academic Collaboration",nameCn:"发展学术合作",description:"Establish academic partnerships for research, publications, and evidence generation",descriptionCn:"建立学术合作伙伴关系，开展研究、发表和证据生成",targetBarriers:["ind_motivation","out_partnerships","ind_opinion_leaders","inn_ev
